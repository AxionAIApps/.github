# ============================================================================
# Axion AI — Reusable Flutter Build & Deploy Workflow
# ============================================================================
# Every Flutter app calls this with a 10-line caller workflow.
# Per-app config is passed as inputs. Secrets are inherited from org level.
#
# Caller example:
#   jobs:
#     deploy:
#       uses: AxionAIApps/.github/.github/workflows/flutter-build-deploy.yml@main
#       with:
#         app_name: healthbridge
#         bundle_id: com.axionaiapps.healthbridge
#         platform: android
#         track: internal
#       secrets: inherit
# ============================================================================

name: Flutter Build & Deploy

on:
  workflow_call:
    inputs:
      app_name:
        description: 'App name (lowercase, matches repo name)'
        required: true
        type: string
      bundle_id:
        description: 'Android package name / iOS bundle ID'
        required: true
        type: string
      platform:
        description: 'Target platform: android, ios, or both'
        required: false
        type: string
        default: 'android'
      track:
        description: 'Play Store track: internal, alpha, beta, production'
        required: false
        type: string
        default: 'internal'
      flutter_version:
        description: 'Flutter SDK version'
        required: false
        type: string
        default: '3.41.x'
      coverage_threshold:
        description: 'Minimum line coverage percentage (hard gate)'
        required: false
        type: number
        default: 80
      run_maestro:
        description: 'Run Maestro smoke tests (non-blocking)'
        required: false
        type: boolean
        default: false

jobs:
  # ─── Unit Tests (HARD GATE: coverage >= threshold) ──────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for private packages
        run: git config --global url."https://x-access-token:${{ secrets.GH_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n || true

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Check coverage gate
        run: |
          if ! command -v lcov &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y lcov
          fi

          # Clean generated code from coverage
          lcov --remove coverage/lcov.info \
            'lib/l10n/*' '*.g.dart' '*.freezed.dart' \
            -o coverage/lcov_cleaned.info \
            --ignore-errors unused

          # Extract line coverage percentage
          COVERAGE=$(lcov --summary coverage/lcov_cleaned.info 2>&1 | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          echo "Line coverage: ${COVERAGE}%"
          echo "Threshold: ${{ inputs.coverage_threshold }}%"

          # Compare as integers (bash doesn't do float comparison well)
          COVERAGE_INT=$(echo "$COVERAGE" | cut -d'.' -f1)
          if [ "$COVERAGE_INT" -lt "${{ inputs.coverage_threshold }}" ]; then
            echo "::error::Coverage ${COVERAGE}% is below the ${{ inputs.coverage_threshold }}% threshold. Release blocked."
            exit 1
          fi

          echo "## Coverage: ${COVERAGE}% (threshold: ${{ inputs.coverage_threshold }}%)" >> $GITHUB_STEP_SUMMARY

  # ─── Maestro Smoke Tests (non-blocking) ──────────────────────────────────
  maestro-smoke-tests:
    name: Maestro Smoke Tests
    if: ${{ inputs.run_maestro }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for private packages
        run: git config --global url."https://x-access-token:${{ secrets.GH_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc
          df -h

      - name: Run Maestro smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          target: default
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 3; done; input keyevent 82'
            sleep 10
            adb install build/app/outputs/flutter-apk/app-debug.apk
            sleep 8
            ~/.maestro/bin/maestro test .maestro/ --debug-output /tmp/maestro-logs

  # ─── Build Android AAB + Upload to Play Store ────────────────────────────
  build-android:
    name: Build & Upload Android
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for private packages
        run: git config --global url."https://x-access-token:${{ secrets.GH_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n || true

      - name: Apply version from git tag
        run: |
          # Read current build number from pubspec as floor
          CURRENT_BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          # Use whichever is higher: pubspec build number or run_number
          # This prevents Play Store "version code already used" errors
          RUN_NUM="${{ github.run_number }}"
          if [ "$CURRENT_BUILD" -gt "$RUN_NUM" ] 2>/dev/null; then
            BUILD_NUMBER=$((CURRENT_BUILD + 1))
          else
            BUILD_NUMBER="$RUN_NUM"
          fi

          # If a v* tag triggered this run, extract version from tag
          TAG="${GITHUB_REF##*/}"
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            # No version tag — read existing pubspec version
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi

          echo "Setting version: ${VERSION}+${BUILD_NUMBER}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Set up keystore
        env:
          KEYSTORE_BASE64: ${{ secrets[format('{0}_KEYSTORE_BASE64', inputs.app_name)] }}
        run: |
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/release.keystore

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets[format('{0}_STORE_PASSWORD', inputs.app_name)] }}
          KEY_PASSWORD: ${{ secrets[format('{0}_KEY_PASSWORD', inputs.app_name)] }}
          KEY_ALIAS: ${{ secrets[format('{0}_KEY_ALIAS', inputs.app_name)] }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../keystore/release.keystore
          EOF

      - name: Build Android release AAB
        run: flutter build appbundle --release

      - name: AAB build summary
        run: |
          AAB=build/app/outputs/bundle/release/app-release.aab
          SIZE=$(du -sh "$AAB" | cut -f1)
          echo "## Android AAB: $SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ inputs.bundle_id }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: draft

  # ─── Build iOS IPA + Upload to TestFlight ─────────────────────────────────
  build-ios:
    name: Build & Upload iOS
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: [self-hosted, macOS]
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for private packages
        run: git config --global url."https://x-access-token:${{ secrets.GH_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Kill stale builds
        run: |
          killall -9 xcodebuild dartaotruntime 2>/dev/null || true
          echo "Cleared stale build processes"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n || true

      - name: Apply version
        run: |
          CURRENT_BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          RUN_NUM="${{ github.run_number }}"
          if [ "$CURRENT_BUILD" -gt "$RUN_NUM" ] 2>/dev/null; then
            BUILD_NUMBER=$((CURRENT_BUILD + 1))
          else
            BUILD_NUMBER="$RUN_NUM"
          fi
          TAG="${GITHUB_REF##*/}"
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          echo "Setting version: ${VERSION}+${BUILD_NUMBER}"
          sed -i '' "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Install Fastlane
        run: |
          if [ -f Gemfile ]; then
            bundle install
          else
            gem install fastlane
          fi

      - name: Write ASC API key
        run: |
          mkdir -p ~/.secrets
          cat > ~/.secrets/asc-api-key-ci.json <<ASCEOF
          {
            "key_id": "${{ secrets.ASC_KEY_ID }}",
            "issuer_id": "${{ secrets.ASC_ISSUER_ID }}",
            "key": "${{ secrets.ASC_API_KEY_CONTENT }}"
          }
          ASCEOF

      - name: Set up CI keychain
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/ci-signing.keychain-db"
          # Create a temporary keychain for CI signing
          security create-keychain -p ci-build "$KEYCHAIN_PATH" 2>/dev/null || true
          security unlock-keychain -p ci-build "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          # Add CI keychain to search list (keep login keychain too)
          security list-keychains -d user -s "$KEYCHAIN_PATH" ~/Library/Keychains/login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Sync certificates (Fastlane match)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GIT_URL: https://x-access-token:${{ secrets.GH_PRIVATE_REPO_TOKEN }}@github.com/AxionAIApps/certs.git
        run: |
          bundle exec fastlane match appstore \
            --app_identifier "${{ inputs.bundle_id }}" \
            --readonly true \
            --git_url "$GIT_URL" \
            --api_key_path ~/.secrets/asc-api-key-ci.json \
            --keychain_name ci-signing.keychain-db \
            --keychain_password ci-build

      - name: Build iOS IPA
        timeout-minutes: 30
        run: flutter build ipa --release --export-method=app-store

      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA found after build"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"
          bundle exec fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path ~/.secrets/asc-api-key-ci.json \
            --skip_waiting_for_build_processing true \
            --changelog "Automated build via CI"
          echo "## iOS IPA uploaded to TestFlight" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup CI credentials
        if: always()
        run: |
          rm -f ~/.secrets/asc-api-key-ci.json
          # Restore default keychain and remove CI keychain
          security default-keychain -s ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security delete-keychain "$HOME/Library/Keychains/ci-signing.keychain-db" 2>/dev/null || true

  # ─── Metadata Sync ──────────────────────────────────────────────────────
  metadata-sync:
    name: Sync Store Metadata
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: |
          if [ -f Gemfile ]; then
            bundle install
          else
            gem install fastlane
          fi

      - name: Write Play Store credentials
        run: |
          mkdir -p ~/.secrets
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > ~/.secrets/play-sa-v2.json

      - name: Sync Android metadata to Play Store
        env:
          SUPPLY_JSON_KEY: ~/.secrets/play-sa-v2.json
        run: |
          if [ -d "fastlane/metadata/android" ]; then
            # Override Appfile json_key_file to prevent validation error
            if [ -f fastlane/Appfile ]; then
              sed -i 's|json_key_file.*|json_key_file("~/.secrets/play-sa-v2.json")|' fastlane/Appfile
            fi
            bundle exec fastlane supply \
              --json_key ~/.secrets/play-sa-v2.json \
              --package_name "${{ inputs.bundle_id }}" \
              --skip_upload_apk \
              --skip_upload_aab \
              --skip_upload_changelogs \
              --metadata_path fastlane/metadata/android
            echo "## Metadata synced to Play Store" >> $GITHUB_STEP_SUMMARY
          else
            echo "## No metadata directory found — skipping sync" >> $GITHUB_STEP_SUMMARY
          fi
